language: node_js
node_js: stable

# S: Build Lifecycle
install:
    - npm install

script:
    - hexo g

after_script:
    - cd ./public
    - git init
    - git config user.name ${USER_NAME}
    - git config user.email ${USER_EMAIL}
    - git add .
    - git commit -m ${COMMIT_MSG}
    - git push --force --quiet "https://${GH_TOKEN}@${GH_REF}" master:master

branches:
    only:
        - blog-source

env:
    global:
        - GH_REF: github.com/stanhe/stanhe.github.io.git
